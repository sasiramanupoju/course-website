<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Attendance - ACE Engineering College</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom toggle switch styling */
        .status-toggle:checked + div { background-color: #22c55e; } /* Green for Present */
        .status-toggle:not(:checked) + div { background-color: #ef4444; } /* Red for Absent */
        .status-toggle:checked + div > div { transform: translateX(100%); }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <aside class="bg-gray-900 text-white w-64 flex-shrink-0 hidden md:flex flex-col z-30">
        <div class="p-6">
            <h2 class="text-xl font-bold">Instructor Panel</h2>
            <p class="text-gray-400 text-sm mt-1">CSE (AI & ML) Dept</p>
        </div>
        <nav class="mt-4">
            <a href="/teacher-dashboard.html" class="block py-3 px-6 text-gray-400 hover:bg-gray-800 transition">Dashboard</a>
            <a href="manage-attendance.html" class="block py-3 px-6 bg-gray-800 border-l-4 border-blue-500 text-white">Manage Attendance</a>
            <a href="manage-courses.html" class="block py-3 px-6 text-gray-400 hover:bg-gray-800 transition">Course Content</a>
            <a href="quizzes-leaderboard.html" class="block py-3 px-6 text-gray-400 hover:bg-gray-800 transition">Quizzes & Leaderboard</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto w-full">
        <header class="bg-white shadow-sm px-6 py-4 flex items-center justify-between">
            <h1 class="text-xl font-semibold text-gray-800" id="welcome-text">Attendance Manager</h1>
            <button onclick="logout()" class="text-gray-500 hover:text-gray-700 font-medium">Logout</button>
        </header>

        <div class="p-6 space-y-6 max-w-6xl mx-auto w-full">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-wrap gap-4 items-end">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Select Course</label>
                    <select id="filter-course" class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 bg-white">
                        <option value="" disabled selected>Loading courses...</option>
                    </select>
                </div>
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                    <input type="date" id="filter-date" class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500">
                </div>
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Year</label>
                    <select id="filter-year" class="w-full px-4 py-2 border rounded-lg">
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3" selected>3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
                <div class="flex-1 min-w-[150px]">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Section</label>
                    <select id="filter-section" class="w-full px-4 py-2 border rounded-lg">
                        <option value="A" selected>Section A</option>
                        <option value="B">Section B</option>
                        <option value="C">Section C</option>
                    </select>
                </div>
                <button onclick="fetchRoster()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 h-[42px] font-medium shadow-sm">Load Roster</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h2 class="text-lg font-semibold text-gray-800">Class Roster</h2>
                    <div class="space-x-3 hidden" id="action-buttons">
                        <button onclick="markAllPresent()" class="text-sm bg-green-100 text-green-700 px-4 py-2 rounded-md hover:bg-green-200 transition font-medium">Mark All Present</button>
                        <button onclick="saveAttendance()" class="text-sm bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition font-medium shadow-sm">Save Attendance</button>
                    </div>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white text-gray-500 text-sm border-b">
                                <th class="p-4 font-medium">Roll Number</th>
                                <th class="p-4 font-medium">Student Name</th>
                                <th class="p-4 font-medium text-center">Status</th>
                                <th class="p-4 font-medium">Remarks (Optional)</th>
                            </tr>
                        </thead>
                        <tbody id="roster-body">
                            <tr><td colspan="4" class="p-8 text-center text-gray-500">Select parameters and click "Load Roster"</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- SECURITY & AUTHENTICATION CHECK ---
        const currentUserId = localStorage.getItem('userId');
        const currentUserRole = localStorage.getItem('userRole');
        const currentUserName = localStorage.getItem('userName');

        if (!currentUserId || currentUserRole !== 'teacher') {
            alert('Unauthorized Access: Please log in as a Teacher.');
            window.location.href = '/'; 
        }

        document.getElementById('welcome-text').textContent = `Attendance Manager - Prof. ${currentUserName.split(' ')[0]}`;

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        // --- ATTENDANCE LOGIC ---
        let currentRoster = [];

        // Set default date to today
        document.getElementById('filter-date').valueAsDate = new Date();

        // NEW: Fetch courses and populate the dropdown
        async function loadCourseDropdown() {
            try {
                const response = await fetch('/api/courses');
                const courses = await response.json();
                const courseSelect = document.getElementById('filter-course');
                
                courseSelect.innerHTML = ''; // Clear "Loading..." text

                if (courses.length === 0) {
                    courseSelect.innerHTML = '<option value="" disabled selected>No courses available</option>';
                    return;
                }

                // Populate the dropdown
                courses.forEach((course, index) => {
                    const option = document.createElement('option');
                    option.value = course.id;
                    // Format: "Course Title (Prof. Name)"
                    option.textContent = `${course.title} (Prof. ${course.teacher_name})`;
                    if (index === 0) option.selected = true; // Auto-select the first one
                    courseSelect.appendChild(option);
                });
            } catch (error) {
                console.error("Error loading courses:", error);
                document.getElementById('filter-course').innerHTML = '<option value="" disabled selected>Error loading courses</option>';
            }
        }

        async function fetchRoster() {
            const courseId = document.getElementById('filter-course').value;
            const date = document.getElementById('filter-date').value;
            const year = document.getElementById('filter-year').value;
            const section = document.getElementById('filter-section').value;
            
            if (!courseId) {
                alert("Please select a course first.");
                return;
            }

            const tbody = document.getElementById('roster-body');
            tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-500">Loading roster...</td></tr>';
            
            try {
                const res = await fetch(`/api/attendance/roster?course_id=${courseId}&date=${date}&year=${year}&section=${section}`);
                currentRoster = await res.json();
                
                if(currentRoster.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-red-500">No students found for this section.</td></tr>';
                    document.getElementById('action-buttons').classList.add('hidden');
                    return;
                }

                document.getElementById('action-buttons').classList.remove('hidden');
                renderRoster();
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-red-500">Error loading data.</td></tr>';
            }
        }

        function renderRoster() {
            const tbody = document.getElementById('roster-body');
            tbody.innerHTML = '';

            currentRoster.forEach((student, index) => {
                const isPresent = student.status !== 'Absent'; 
                
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-50 hover:bg-gray-50 transition-colors duration-150";
                tr.innerHTML = `
                    <td class="p-4 text-gray-600 font-mono text-sm">${student.roll_number}</td>
                    <td class="p-4 text-gray-800 font-medium">${student.name}</td>
                    <td class="p-4 text-center">
                        <label class="flex items-center justify-center cursor-pointer">
                            <div class="relative">
                                <input type="checkbox" class="sr-only status-toggle" onchange="updateStatus(${index}, this.checked)" ${isPresent ? 'checked' : ''}>
                                <div class="block w-14 h-8 rounded-full transition-colors duration-300">
                                    <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform duration-300 shadow-sm flex items-center justify-center text-xs font-bold text-gray-400"></div>
                                </div>
                            </div>
                        </label>
                    </td>
                    <td class="p-4">
                        <input type="text" placeholder="Add note..." value="${student.remarks}" onchange="updateRemarks(${index}, this.value)" class="w-full px-3 py-1.5 border border-gray-200 rounded text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all">
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateStatus(index, isChecked) {
            currentRoster[index].status = isChecked ? 'Present' : 'Absent';
        }

        function updateRemarks(index, value) {
            currentRoster[index].remarks = value;
        }

        function markAllPresent() {
            currentRoster.forEach(s => s.status = 'Present');
            renderRoster();
        }

        async function saveAttendance() {
            const courseId = document.getElementById('filter-course').value;
            const date = document.getElementById('filter-date').value;

            if (!courseId) {
                alert("Please select a course.");
                return;
            }

            // Prepare payload
            const records = currentRoster.map(s => ({
                student_id: s.student_id,
                status: s.status === 'Pending' ? 'Present' : s.status, // Default untouched to present
                remarks: s.remarks
            }));

            try {
                const res = await fetch('/api/attendance/bulk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ course_id: courseId, date, records })
                });

                if (res.ok) {
                    alert('Attendance successfully recorded!');
                    fetchRoster(); // Reload to show saved state
                } else {
                    const errorData = await res.json();
                    alert(`Failed to save: ${errorData.error}\n${errorData.details || ''}`);
                }
            } catch (err) {
                console.error(err);
                alert('Network error while saving.');
            }
        }

        // Initialize page by loading the dropdown options
        document.addEventListener('DOMContentLoaded', loadCourseDropdown);
    </script>
</body>
</html>
