<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Environment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <div id="viewer-modal" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-6xl h-[90vh] flex flex-col overflow-hidden animate-fade-in">
            <div class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center">
                <h2 id="viewer-title" class="text-lg font-bold">Document Viewer</h2>
                <button onclick="closeViewer()" class="text-gray-400 hover:text-white font-bold text-2xl">&times;</button>
            </div>
            <iframe id="document-frame" class="w-full flex-1 bg-gray-100" src=""></iframe>
        </div>
    </div>

    <div id="take-quiz-modal" class="fixed inset-0 bg-white hidden z-50 transition-opacity duration-300 opacity-0 flex-col overflow-hidden">
        <div class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center shrink-0 z-20">
            <div class="flex items-center gap-4">
                <button onclick="closeQuizModal()" class="text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors font-bold text-2xl w-10 h-10 rounded-full flex items-center justify-center">&times;</button>
                <div>
                    <h2 id="taking-quiz-title" class="text-xl font-extrabold text-gray-800">Quiz Title</h2>
                    <p class="text-gray-500 text-xs sm:text-sm mt-0.5">Select all correct answers. Progress is saved as you navigate.</p>
                </div>
            </div>
            <div class="text-sm font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-lg border border-blue-100 hidden sm:block">Interactive Focus Mode</div>
        </div>

        <div class="flex flex-1 overflow-hidden flex-col md:flex-row">
            <div class="flex-1 overflow-y-auto p-6 sm:p-10 relative bg-gray-50 flex flex-col">
                <div class="max-w-4xl mx-auto w-full flex-1 flex flex-col">
                    <div class="mb-8">
                        <div class="flex justify-between text-sm text-gray-500 font-bold mb-2">
                            <span id="quiz-progress-text">Question 1 of N</span>
                            <span id="quiz-progress-percentage">0%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full transition-all duration-300" id="quiz-progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                    <div id="active-question-container" class="flex-1"></div>
                    <div class="mt-10 pt-6 border-t border-gray-200 flex justify-between items-center pb-8">
                        <button onclick="prevQuestion()" id="btn-prev" class="px-6 py-3 bg-white border border-gray-300 text-gray-700 font-bold rounded-xl hover:bg-gray-100 transition-colors">&larr; Previous</button>
                        <button onclick="nextQuestion()" id="btn-next" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-lg transition-all">Next &rarr;</button>
                    </div>
                </div>
            </div>
            <div class="w-full md:w-80 bg-white border-l border-gray-200 flex flex-col shrink-0 h-64 md:h-auto border-t md:border-t-0">
                <div class="p-6 border-b border-gray-100"><h3 class="font-bold text-gray-800">Question Navigator</h3></div>
                <div class="p-6 overflow-y-auto flex-1">
                    <div class="grid grid-cols-5 md:grid-cols-4 gap-3" id="question-palette"></div>
                </div>
                <div class="p-6 border-t border-gray-100 bg-gray-50">
                    <button onclick="submitQuiz()" id="submit-quiz-btn" class="w-full px-6 py-4 bg-green-600 text-white font-extrabold rounded-xl hover:bg-green-700 hover:-translate-y-1 transform transition-all shadow-lg">Submit Answers</button>
                </div>
            </div>
        </div>
    </div>

    <div id="assignment-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl h-[90vh] flex flex-col overflow-hidden animate-fade-in">
            <div class="bg-white px-6 py-4 flex justify-between items-center border-b">
                <div>
                    <h2 id="modal-assign-title" class="text-xl font-bold text-gray-800">Assignment</h2>
                    <p id="modal-assign-meta" class="text-sm text-gray-500"></p>
                </div>
                <button onclick="closeAssignmentModal()" class="text-gray-400 hover:text-red-600 font-bold text-2xl bg-gray-100 w-10 h-10 rounded-full">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 bg-gray-50 flex flex-col md:flex-row gap-6">
                <div class="md:w-1/2 flex flex-col">
                    <h3 class="font-bold text-gray-700 uppercase tracking-wide text-xs mb-2">Instructions</h3>
                    <div id="modal-assign-desc" class="bg-white p-6 rounded-xl border shadow-sm text-gray-800 whitespace-pre-wrap flex-1"></div>
                </div>
                <div class="md:w-1/2 flex flex-col" id="assignment-action-area"></div>
            </div>
        </div>
    </div>


    <main class="flex-1 flex flex-col h-screen overflow-y-auto w-full relative">
        <header class="bg-white shadow-sm px-6 py-4 sticky top-0 z-40">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="window.location.href='/student-dashboard.html'" class="text-gray-500 hover:text-blue-600 transition font-bold">&larr; Dashboard</button>
                    <h1 class="text-xl font-bold text-gray-800" id="course-title-header">Loading Course...</h1>
                </div>
                <div class="hidden sm:flex flex-col items-end">
                    <span class="text-xs font-bold text-gray-500 mb-1">Overall Progress: <span id="overall-progress-text" class="text-blue-600">0%</span></span>
                    <div class="w-48 bg-gray-200 rounded-full h-2 overflow-hidden">
                        <div id="overall-progress-bar" class="bg-blue-600 h-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </header>

        <div class="p-6 space-y-6 max-w-6xl mx-auto w-full mt-2">
            
            <div class="border-b border-gray-200">
                <nav class="-mb-px flex space-x-8">
                    <button onclick="switchTab('materials')" id="tab-materials" class="border-blue-500 text-blue-600 py-4 border-b-2 font-bold text-sm">Course Materials</button>
                    <button onclick="switchTab('quizzes')" id="tab-quizzes" class="border-transparent text-gray-500 py-4 border-b-2 font-bold text-sm">Quizzes</button>
                    <button onclick="switchTab('assignments')" id="tab-assignments" class="border-transparent text-gray-500 py-4 border-b-2 font-bold text-sm">Assignments</button>
                </nav>
            </div>

            <div id="section-materials" class="block space-y-4">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-gray-100">
                            <tr>
                                <th class="p-4 font-bold text-gray-500">Material</th>
                                <th class="p-4 font-bold text-gray-500 text-center">Status</th>
                                <th class="p-4 font-bold text-gray-500 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="materials-list" class="divide-y divide-gray-100">
                            <tr><td colspan="3" class="p-8 text-center text-gray-500">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="section-quizzes" class="hidden space-y-4">
                <div id="quizzes-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full p-8 text-center text-gray-500">Loading...</div>
                </div>
            </div>

            <div id="section-assignments" class="hidden space-y-4">
                <div id="assignments-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full p-8 text-center text-gray-500">Loading assignments...</div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const studentId = localStorage.getItem('userId');
        const courseId = new URLSearchParams(window.location.search).get('id');
        
        if (!studentId || !courseId) window.location.href = '/student-dashboard.html';

        let courseData = { materials: [], quizzes: [], assignments: [] };

        // --- Core Init ---
        document.addEventListener('DOMContentLoaded', loadCourseEngine);

        function switchTab(tab) {
            ['materials', 'quizzes', 'assignments'].forEach(t => {
                document.getElementById(`section-${t}`).classList.toggle('hidden', tab !== t);
                document.getElementById(`tab-${t}`).className = tab === t 
                    ? 'border-blue-500 text-blue-600 py-4 border-b-2 font-bold text-sm transition-colors' 
                    : 'border-transparent text-gray-500 hover:text-gray-700 py-4 border-b-2 font-bold text-sm transition-colors';
            });
        }

        async function loadCourseEngine() {
            try {
                // Fetch basic course data, materials, quizzes
                const res1 = await fetch(`/api/student/course-view/${courseId}/${studentId}`);
                const data1 = await res1.json();
                
                // Fetch assignments separately
                const res2 = await fetch(`/api/student/courses/${courseId}/assignments/${studentId}`);
                const data2 = await res2.json();

                document.getElementById('course-title-header').textContent = data1.course.title;
                
                courseData.materials = data1.materials || [];
                courseData.quizzes = data1.quizzes || [];
                courseData.assignments = data2 || [];

                renderMaterials(courseData.materials);
                renderQuizzes(courseData.quizzes);
                renderAssignments(courseData.assignments);
                
                calculateOverallProgress();

            } catch (err) { 
                console.error(err);
                alert('Failed to load course environment.'); 
            }
        }

        function calculateOverallProgress() {
            let totalItems = courseData.materials.length + courseData.quizzes.length + courseData.assignments.length;
            if (totalItems === 0) return;

            let completedItems = 0;
            courseData.materials.forEach(m => { if(m.is_completed) completedItems++; });
            courseData.quizzes.forEach(q => { if(q.is_completed) completedItems++; });
            courseData.assignments.forEach(a => { if(a.submission) completedItems++; });

            const percentage = Math.round((completedItems / totalItems) * 100);
            document.getElementById('overall-progress-text').textContent = percentage + '%';
            document.getElementById('overall-progress-bar').style.width = percentage + '%';
        }

        // ==========================================
        // 1. MATERIALS LOGIC
        // ==========================================
        function renderMaterials(materials) {
            const list = document.getElementById('materials-list');
            list.innerHTML = '';
            if (materials.length === 0) return list.innerHTML = `<tr><td colspan="3" class="p-8 text-center text-gray-500 italic">No materials uploaded yet.</td></tr>`;

            materials.forEach(mat => {
                const statusHtml = mat.is_completed 
                    ? `<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold border border-green-200">Read ✓</span>` 
                    : `<span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-full text-xs font-bold border border-yellow-200">Unread</span>`;
                
                list.innerHTML += `
                    <tr class="hover:bg-gray-50 transition-colors border-b">
                        <td class="p-4 font-bold text-gray-800">${mat.title} <span class="ml-2 text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded uppercase">${mat.type}</span></td>
                        <td class="p-4 text-center">${statusHtml}</td>
                        <td class="p-4 text-right">
                            <button onclick="openViewer(${mat.id}, '${mat.file_url}', '${mat.title}')" class="bg-blue-50 border border-blue-200 text-blue-700 px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-100 transition-colors shadow-sm">View Document</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function openViewer(contentId, fileUrl, title) {
            // Track completion instantly
            fetch('/api/content/track', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: studentId, content_id: contentId })
            }).then(() => loadCourseEngine()); // Reload in background to update progress

            document.getElementById('viewer-title').textContent = title;
            document.getElementById('document-frame').src = fileUrl;
            document.getElementById('viewer-modal').classList.remove('hidden');
            document.getElementById('viewer-modal').classList.add('flex');
        }

        function closeViewer() {
            document.getElementById('viewer-modal').classList.add('hidden');
            document.getElementById('viewer-modal').classList.remove('flex');
            document.getElementById('document-frame').src = "";
        }

        // ==========================================
        // 2. QUIZ LOGIC (Interactive Step-by-Step)
        // ==========================================
        let activeQuizData = null;
        let currentQuestionIndex = 0;
        let userAnswers = {}; // Format: { 0: ['A', 'C'], 1: ['B'] }

        function renderQuizzes(quizzes) {
            const list = document.getElementById('quizzes-list');
            list.innerHTML = '';
            if (quizzes.length === 0) return list.innerHTML = `<div class="col-span-full p-8 text-center text-gray-500 bg-white rounded-xl border border-dashed">No quizzes available.</div>`;

            quizzes.forEach(quiz => {
                const actionBtn = !quiz.is_completed 
                    ? `<button onclick="startQuiz(${quiz.id})" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md hover:-translate-y-0.5 transition-all">Start Quiz</button>`
                    : `<button disabled class="w-full bg-green-50 text-green-700 py-3 rounded-xl font-bold border border-green-200 cursor-not-allowed">Completed ✓</button>`;

                list.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl border shadow-sm hover:shadow-md transition duration-300">
                        <h3 class="font-bold text-lg text-gray-800 mb-1">${quiz.title}</h3>
                        <p class="text-sm text-gray-500 mb-5">${quiz.question_count} Questions total</p>
                        ${actionBtn}
                    </div>
                `;
            });
        }

        async function startQuiz(quizId) {
            try {
                const res = await fetch(`/api/quizzes/${quizId}`);
                activeQuizData = await res.json();
                if (typeof activeQuizData.questions === 'string') {
                    activeQuizData.questions = JSON.parse(activeQuizData.questions);
                }

                userAnswers = {};
                currentQuestionIndex = 0;

                document.getElementById('taking-quiz-title').textContent = activeQuizData.title;
                
                const modal = document.getElementById('take-quiz-modal');
                modal.classList.remove('hidden'); modal.classList.add('flex');
                void modal.offsetWidth; 
                modal.classList.remove('opacity-0'); modal.classList.add('opacity-100');

                renderQuizInterface();

            } catch (err) { alert("Failed to load quiz."); }
        }

        function closeQuizModal() {
            if(!confirm("Are you sure? Your current progress will be lost.")) return;
            const modal = document.getElementById('take-quiz-modal');
            modal.classList.remove('opacity-100'); modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden'); modal.classList.remove('flex');
                activeQuizData = null;
            }, 300);
        }

        function saveCurrentAnswer() {
            if (!activeQuizData) return;
            const checkboxes = document.querySelectorAll(`input[name="active_q"]:checked`);
            userAnswers[currentQuestionIndex] = Array.from(checkboxes).map(cb => cb.value);
        }

        function renderQuizInterface() {
            const total = activeQuizData.questions.length;
            const q = activeQuizData.questions[currentQuestionIndex];
            const savedAnswers = userAnswers[currentQuestionIndex] || [];

            const container = document.getElementById('active-question-container');
            container.innerHTML = `
                <div class="bg-white p-8 rounded-2xl border border-gray-200 shadow-sm animate-fade-in">
                    <h3 class="font-bold text-gray-800 text-xl md:text-2xl mb-8 leading-relaxed flex flex-col md:flex-row items-start">
                        <span class="shrink-0 inline-flex items-center justify-center bg-blue-100 text-blue-700 font-extrabold w-10 h-10 rounded-xl mb-4 md:mb-0 md:mr-4 text-lg">Q${currentQuestionIndex + 1}</span> 
                        <span class="pt-1">${q.question}</span>
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${['A','B','C','D'].map(opt => {
                            const isChecked = savedAnswers.includes(opt) ? 'checked' : '';
                            return `
                            <label class="group flex items-start space-x-4 bg-gray-50 p-5 border-2 border-gray-100 rounded-xl hover:border-blue-400 hover:bg-blue-50 cursor-pointer transition-all duration-200 ${isChecked ? 'border-blue-500 bg-blue-50' : ''}" onclick="setTimeout(renderPalette, 50)">
                                <input type="checkbox" name="active_q" value="${opt}" ${isChecked} class="mt-1 shrink-0 w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                <span class="font-medium text-gray-700 group-hover:text-blue-900 leading-tight">${opt}. ${q.options[opt]}</span>
                            </label>`;
                        }).join('')}
                    </div>
                </div>
            `;

            // Progress Bar
            const percent = (((currentQuestionIndex + 1) / total) * 100).toFixed(0);
            document.getElementById('quiz-progress-text').textContent = `Question ${currentQuestionIndex + 1} of ${total}`;
            document.getElementById('quiz-progress-percentage').textContent = `${percent}%`;
            document.getElementById('quiz-progress-bar').style.width = `${percent}%`;

            // Navigation Buttons
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            btnPrev.style.visibility = currentQuestionIndex === 0 ? 'hidden' : 'visible';
            
            if (currentQuestionIndex === total - 1) {
                btnNext.innerHTML = 'Review Mode';
                btnNext.className = 'px-8 py-3 bg-gray-800 text-white font-bold rounded-xl hover:bg-gray-900 transition-all';
            } else {
                btnNext.innerHTML = 'Next &rarr;';
                btnNext.className = 'px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-lg transition-all';
            }

            renderPalette();
        }

        function renderPalette() {
            saveCurrentAnswer(); 
            const palette = document.getElementById('question-palette');
            const total = activeQuizData.questions.length;
            palette.innerHTML = '';

            for (let i = 0; i < total; i++) {
                const isCurrent = i === currentQuestionIndex;
                const hasAnswered = userAnswers[i] && userAnswers[i].length > 0;
                
                let stateClasses = "bg-white text-gray-500 border-gray-200 hover:border-gray-300"; // Default
                if (hasAnswered) stateClasses = "bg-blue-100 text-blue-700 border-blue-200"; // Answered
                if (isCurrent) stateClasses += " ring-2 ring-blue-500 ring-offset-2"; // Focused

                palette.innerHTML += `<button type="button" onclick="jumpToQuestion(${i})" class="flex items-center justify-center w-10 h-10 rounded-lg font-bold text-sm transition-all duration-200 border-2 ${stateClasses}">${i + 1}</button>`;
            }
        }

        function nextQuestion() {
            saveCurrentAnswer();
            if (currentQuestionIndex < activeQuizData.questions.length - 1) {
                currentQuestionIndex++; renderQuizInterface();
            } else {
                document.getElementById('submit-quiz-btn').classList.add('ring-4', 'ring-green-300');
                setTimeout(() => document.getElementById('submit-quiz-btn').classList.remove('ring-4', 'ring-green-300'), 500);
            }
        }

        function prevQuestion() { saveCurrentAnswer(); if (currentQuestionIndex > 0) { currentQuestionIndex--; renderQuizInterface(); } }
        function jumpToQuestion(index) { saveCurrentAnswer(); currentQuestionIndex = index; renderQuizInterface(); }

        async function submitQuiz() {
            saveCurrentAnswer();
            const total = activeQuizData.questions.length;
            let answeredCount = 0;
            for(let i=0; i<total; i++) if(userAnswers[i] && userAnswers[i].length > 0) answeredCount++;

            if(answeredCount < total) {
                if(!confirm(`You only answered ${answeredCount} out of ${total} questions. Submit anyway?`)) return;
            } else {
                if(!confirm("Ready to submit your final answers?")) return;
            }

            const btn = document.getElementById('submit-quiz-btn');
            btn.textContent = 'Grading...'; btn.disabled = true;

            let correctCount = 0;
            activeQuizData.questions.forEach((q, index) => {
                const uAns = (userAnswers[index] || []).sort();
                const cAns = [...q.correct_answers].sort();
                if (JSON.stringify(uAns) === JSON.stringify(cAns)) correctCount++;
            });

            const finalScore = ((correctCount / total) * 100).toFixed(2);

            try {
                await fetch('/api/quizzes/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id: studentId, quiz_id: activeQuizData.id, score: finalScore })
                });
                alert(`Quiz Complete! You scored ${finalScore}%`);
                
                const modal = document.getElementById('take-quiz-modal');
                modal.classList.remove('opacity-100'); modal.classList.add('opacity-0');
                setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);

                loadCourseEngine(); // Reload to update UI
            } catch (err) { alert("Network Error."); } 
            finally { btn.textContent = 'Submit Answers'; btn.disabled = false; }
        }

        // ==========================================
        // 3. ASSIGNMENTS LOGIC
        // ==========================================
        function renderAssignments(assignments) {
            const list = document.getElementById('assignments-list');
            list.innerHTML = '';
            
            if(assignments.length === 0) return list.innerHTML = `<div class="col-span-full p-8 text-center text-gray-500 bg-white rounded-xl border border-dashed">No assignments available.</div>`;

            assignments.forEach((assign, index) => {
                let statusHtml, buttonHtml;

                if (assign.submission) {
                    if (assign.submission.marks_awarded !== null) {
                        statusHtml = `<span class="bg-green-100 text-green-800 text-xs font-bold px-3 py-1 rounded-full border border-green-200 shadow-sm">Graded: ${assign.submission.marks_awarded}/${assign.max_marks}</span>`;
                        buttonHtml = `<button onclick="openAssignment(${index})" class="w-full mt-4 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold border hover:bg-gray-200 transition">View Feedback</button>`;
                    } else {
                        statusHtml = `<span class="bg-yellow-100 text-yellow-800 text-xs font-bold px-3 py-1 rounded-full border border-yellow-200 shadow-sm">Pending Grade</span>`;
                        buttonHtml = `<button onclick="openAssignment(${index})" class="w-full mt-4 bg-blue-50 text-blue-700 py-3 rounded-xl font-bold border border-blue-200 hover:bg-blue-100 transition">Review Submission</button>`;
                    }
                } else {
                    statusHtml = `<span class="bg-red-100 text-red-800 text-xs font-bold px-3 py-1 rounded-full border border-red-200 shadow-sm">To Do</span>`;
                    buttonHtml = `<button onclick="openAssignment(${index})" class="w-full mt-4 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md hover:-translate-y-0.5 transition-all">Attempt Assignment</button>`;
                }

                list.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl border shadow-sm hover:shadow-md transition duration-300 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-lg text-gray-800 pr-2">${assign.title}</h3>
                                <div class="shrink-0">${statusHtml}</div>
                            </div>
                            <p class="text-sm text-gray-500 mb-1 flex items-center">
                                <svg class="w-4 h-4 mr-1 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Due: ${new Date(assign.due_date).toLocaleString()}
                            </p>
                        </div>
                        ${buttonHtml}
                    </div>
                `;
            });
        }

        function openAssignment(index) {
            const assign = courseData.assignments[index];
            document.getElementById('modal-assign-title').textContent = assign.title;
            document.getElementById('modal-assign-meta').textContent = `Due: ${new Date(assign.due_date).toLocaleString()} | Max Marks: ${assign.max_marks}`;
            document.getElementById('modal-assign-desc').textContent = assign.description;

            const actionArea = document.getElementById('assignment-action-area');
            
            if (assign.submission) {
                const feedbackHtml = assign.submission.marks_awarded !== null 
                    ? `<div class="mt-4 p-5 bg-green-50 border border-green-200 rounded-xl shadow-sm">
                        <h4 class="font-extrabold text-green-800 mb-1 text-lg">Grade: ${assign.submission.marks_awarded} / ${assign.max_marks}</h4>
                        <p class="text-green-800 font-medium whitespace-pre-wrap">${assign.submission.teacher_feedback || 'No written feedback provided.'}</p>
                       </div>`
                    : `<div class="mt-4 p-4 bg-yellow-50 border border-yellow-200 rounded-xl text-yellow-800 text-sm font-bold shadow-sm">Your instructor has not graded this yet.</div>`;

                actionArea.innerHTML = `
                    <h3 class="font-bold text-gray-700 uppercase tracking-wide text-xs mb-2">Your Submission</h3>
                    <div class="bg-gray-100 p-6 rounded-xl border border-gray-200 text-gray-600 whitespace-pre-wrap flex-1 overflow-y-auto font-medium">
                        ${assign.submission.answer_text}
                    </div>
                    ${feedbackHtml}
                `;
            } else {
                actionArea.innerHTML = `
                    <h3 class="font-bold text-gray-700 uppercase tracking-wide text-xs mb-2">Your Answer</h3>
                    <textarea id="student-answer-input" class="w-full flex-1 border-2 border-gray-200 rounded-xl p-4 focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 transition-all resize-none shadow-inner" placeholder="Type your full answer here..."></textarea>
                    <button onclick="submitAssignment(${assign.id})" class="mt-4 w-full bg-blue-600 text-white font-extrabold py-4 rounded-xl hover:bg-blue-700 hover:-translate-y-0.5 transition-all shadow-lg">Submit Final Assignment</button>
                `;
            }

            const modal = document.getElementById('assignment-modal');
            modal.classList.remove('hidden'); modal.classList.add('flex');
        }

        function closeAssignmentModal() {
            document.getElementById('assignment-modal').classList.add('hidden');
            document.getElementById('assignment-modal').classList.remove('flex');
        }

        async function submitAssignment(assignId) {
            const answerText = document.getElementById('student-answer-input').value;
            if (!answerText.trim()) return alert("Answer cannot be empty!");
            if (!confirm("Are you sure you want to submit? You cannot edit this later.")) return;

            try {
                await fetch('/api/student/assignments/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ assignment_id: assignId, student_id: studentId, answer_text: answerText })
                });
                alert('Assignment Submitted!');
                closeAssignmentModal();
                loadCourseEngine(); // Refresh to show "Pending Grade"
            } catch (err) { alert('Network Error.'); }
        }

    </script>
</body>
</html>
