<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Courses - ACE Engineering College</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden">

    <div id="edit-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md transform transition-all">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Edit Course</h2>
            <input type="hidden" id="edit-course-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Course Title</label>
                    <input type="text" id="edit-course-title" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <textarea id="edit-course-desc" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
            </div>
            <div class="mt-6 flex justify-end gap-3">
                <button onclick="closeEditModal()" class="px-4 py-2 bg-gray-100 text-gray-700 font-medium rounded-lg hover:bg-gray-200 transition">Cancel</button>
                <button onclick="submitEditCourse()" id="save-edit-btn" class="px-4 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition shadow-sm">Save Changes</button>
            </div>
        </div>
    </div>

    <aside class="bg-gray-900 text-white w-64 flex-shrink-0 hidden md:flex flex-col z-30">
        <div class="p-6">
            <h2 class="text-xl font-bold">Instructor Panel</h2>
            <p class="text-gray-400 text-sm mt-1">CSE (AI & ML) Dept</p>
        </div>
        <nav class="mt-4">
            <a href="/teacher-dashboard.html" class="block py-3 px-6 text-gray-400 hover:bg-gray-800 transition">Dashboard</a>
            <a href="/manage-attendance.html" class="block py-3 px-6 text-gray-400 hover:bg-gray-800 transition">Manage Attendance</a>
            <a href="manage-courses.html" class="block py-3 px-6 bg-gray-800 border-l-4 border-blue-500 text-white">Course Management</a>
            <a href="quizzes-leaderboard.html" class="block py-3 px-6 text-gray-400 hover:bg-gray-800 transition">Quizzes & Leaderboard</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto w-full">
        <header class="bg-white shadow-sm px-6 py-4 flex items-center justify-between">
            <h1 class="text-xl font-semibold text-gray-800" id="welcome-text">Course Management</h1>
            <button onclick="logout()" class="text-gray-500 hover:text-gray-700 font-medium">Logout</button>
        </header>

        <div class="p-6 space-y-6 max-w-7xl mx-auto w-full">
            
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 bg-blue-50">
                    <h2 class="text-lg font-semibold text-blue-800">Create a New Course</h2>
                    <p class="text-sm text-blue-600 mt-1">Establish a new classroom space for content and attendance.</p>
                </div>
                <div class="p-6">
                    <form id="create-course-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Course Title</label>
                            <input type="text" id="course-title" required placeholder="e.g., Quantum Machine Learning" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Course Description</label>
                            <textarea id="course-desc" rows="2" placeholder="Briefly describe the syllabus and objectives..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"></textarea>
                        </div>
                        <div class="flex justify-end">
                            <button type="submit" class="bg-blue-600 text-white font-medium px-6 py-2 rounded-lg hover:bg-blue-700 transition shadow-sm">
                                + Add Course
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div>
                <h2 class="text-xl font-bold text-gray-800 mb-4">Active Courses</h2>
                <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="col-span-full text-center py-8 text-gray-500">
                        Loading your courses...
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // --- 1. SECURITY & AUTHENTICATION CHECK ---
        const currentUserId = localStorage.getItem('userId');
        const currentUserRole = localStorage.getItem('userRole');
        const currentUserName = localStorage.getItem('userName');

        if (!currentUserId || currentUserRole !== 'teacher') {
            alert('Unauthorized Access: Please log in as a Teacher.');
            window.location.href = '/'; 
        }

        document.getElementById('welcome-text').textContent = `Manage Courses - Prof. ${currentUserName.split(' ')[0]}`;

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        // --- 2. COURSE MANAGEMENT LOGIC ---
        const courseForm = document.getElementById('create-course-form');
        const coursesGrid = document.getElementById('courses-grid');
        const editModal = document.getElementById('edit-modal');

        async function loadCourses() {
            try {
                const response = await fetch('/api/courses');
                const courses = await response.json();

                coursesGrid.innerHTML = ''; 

                if (courses.length === 0) {
                    coursesGrid.innerHTML = `
                        <div class="col-span-full bg-white p-8 rounded-xl border border-dashed border-gray-300 text-center text-gray-500">
                            No courses have been created yet. Use the form above to start!
                        </div>
                    `;
                    return;
                }

                courses.forEach(course => {
                    const isMyCourse = course.teacher_name === currentUserName;
                    const borderClass = isMyCourse ? 'border-blue-400 ring-1 ring-blue-100' : 'border-gray-100';
                    const labelHtml = isMyCourse ? '<span class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded">Yours</span>' : '';

                    // Safely escape strings for inline JS functions
                    const safeTitle = course.title.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    const safeDesc = (course.description || '').replace(/'/g, "\\'").replace(/"/g, "&quot;");

                    // Only show Edit/Delete if the teacher owns the course
                    const actionButtons = isMyCourse ? `
                        <div class="mt-4 flex gap-2 w-full">
                            <button onclick="viewCourse(${course.id})" class="flex-1 text-xs bg-blue-100 text-blue-700 font-semibold py-2 rounded-lg hover:bg-blue-200 transition">View</button>
                            <button onclick="openEditModal(${course.id}, '${safeTitle}', '${safeDesc}')" class="flex-1 text-xs bg-yellow-100 text-yellow-700 font-semibold py-2 rounded-lg hover:bg-yellow-200 transition">Edit</button>
                            <button onclick="deleteCourse(${course.id})" class="flex-1 text-xs bg-red-100 text-red-700 font-semibold py-2 rounded-lg hover:bg-red-200 transition">Delete</button>
                        </div>
                    ` : `
                        <div class="mt-4 w-full">
                            <button onclick="viewCourse(${course.id})" class="w-full text-xs bg-gray-100 text-gray-700 font-semibold py-2 rounded-lg hover:bg-gray-200 transition">View Content</button>
                        </div>
                    `;

                    const card = document.createElement('div');
                    card.className = `bg-white p-6 rounded-xl shadow-sm border ${borderClass} hover:shadow-md transition duration-200 flex flex-col h-full`;
                    card.innerHTML = `
                        <div class="flex-1">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-lg font-bold text-gray-800 leading-tight pr-2">${course.title}</h3>
                                <div class="flex flex-col items-end gap-1">
                                    <span class="bg-gray-100 text-gray-600 text-xs font-bold px-2 py-1 rounded-md whitespace-nowrap">ID: ${course.id}</span>
                                    ${labelHtml}
                                </div>
                            </div>
                            <p class="text-sm text-gray-600 mb-4 line-clamp-3">${course.description || 'No description provided.'}</p>
                            <span class="text-xs font-medium text-gray-500 flex items-center">
                                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                Prof. ${course.teacher_name}
                            </span>
                        </div>
                        ${actionButtons}
                    `;
                    coursesGrid.appendChild(card);
                });

            } catch (error) {
                console.error("Error loading courses:", error);
                coursesGrid.innerHTML = `<div class="col-span-full text-red-500 text-center py-8">Failed to load courses.</div>`;
            }
        }

        // --- ACTION FUNCTIONS ---

        // 1. View Course
        function viewCourse(courseId) {
            // Divert to the new view page, passing the course ID in the URL
            window.location.href = `/view-course.html?id=${courseId}`;
        }

        // 2. Delete Course
        async function deleteCourse(courseId) {
            if (!confirm("Are you sure you want to delete this course? All associated content, attendance, and quizzes will be permanently deleted.")) return;

            try {
                const response = await fetch(`/api/courses/${courseId}`, { method: 'DELETE' });
                if (response.ok) {
                    loadCourses(); // Refresh grid
                } else {
                    alert('Failed to delete course.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Network error while deleting.');
            }
        }

        // 3. Edit Course Modal Logic
        function openEditModal(id, title, desc) {
            document.getElementById('edit-course-id').value = id;
            document.getElementById('edit-course-title').value = title;
            document.getElementById('edit-course-desc').value = desc !== 'undefined' ? desc : '';
            editModal.classList.remove('hidden');
            editModal.classList.add('flex');
        }

        function closeEditModal() {
            editModal.classList.add('hidden');
            editModal.classList.remove('flex');
        }

        async function submitEditCourse() {
            const id = document.getElementById('edit-course-id').value;
            const title = document.getElementById('edit-course-title').value;
            const description = document.getElementById('edit-course-desc').value;
            const btn = document.getElementById('save-edit-btn');

            btn.textContent = 'Saving...';
            btn.disabled = true;

            try {
                const response = await fetch(`/api/courses/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description })
                });

                if (response.ok) {
                    closeEditModal();
                    loadCourses();
                } else {
                    alert('Failed to update course.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Network error while updating.');
            } finally {
                btn.textContent = 'Save Changes';
                btn.disabled = false;
            }
        }

        // Handle creating a new course
        courseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newCourseData = {
                title: document.getElementById('course-title').value,
                description: document.getElementById('course-desc').value,
                teacher_id: currentUserId 
            };
            try {
                const response = await fetch('/api/courses/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newCourseData)
                });
                if (response.ok) {
                    courseForm.reset();
                    loadCourses(); 
                } else {
                    alert('Failed to create course.');
                }
            } catch (error) {
                console.error('Network Error:', error);
            }
        });

        // Initialize page
        document.addEventListener('DOMContentLoaded', loadCourses);
    </script>
</body>
</html>
